<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>METFLIX - Watch</title>

<link rel="stylesheet"
href="css/watch.css">

<link rel="preconnect"
href="https://image.tmdb.org">

<link rel="preconnect"
href="https://api.themoviedb.org">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- ===========================
LOADING
=========================== -->

<div
id="loadingScreen"
class="loading-screen">

<div class="loading-content">

<img
src="metflixlogo.png"
class="loading-logo"
alt="METFLIX">

<div class="loading-spinner"></div>

<h2>

Loading Movie...

</h2>

<p>

Please wait...

</p>

</div>

</div>

<!-- ===========================
ERROR
=========================== -->

<div
id="errorScreen"
class="error-screen">

<div class="error-content">

<i class="fas fa-triangle-exclamation"></i>

<h2>

Movie Not Found

</h2>

<p>

Sorry, we couldn't load this movie.

</p>

<button id="backHomeBtn">

Go Back Home

</button>

</div>

</div>

<div class="watch-page">

<button
id="backBtn"
class="back-btn">

<i class="fas fa-arrow-left"></i>

Back

</button>

<!-- ===========================
HERO
=========================== -->

<section class="hero">

<img

id="backdropImage"

class="hero-backdrop"

src=""

alt="Backdrop">

<div class="hero-overlay">

<div class="hero-content">

<div class="poster-section">

<img

id="posterImage"

src=""

alt="Poster">

</div>

<div class="movie-info">

<h1 id="movieTitle">

Loading...

</h1>

<div class="movie-meta">

<span id="movieYear"></span>

<span>•</span>

<span id="movieRuntime"></span>

<span>•</span>

<span id="movieLanguage"></span>

</div>

<div class="movie-rating">

<i class="fas fa-star"></i>

<span id="movieRating"></span>

</div>

<div
id="movieGenres"
class="genres">

</div>

<p id="movieDescription">

</p>

<div class="action-buttons">

<button

id="watchNowBtn"

class="primary-btn">

<i class="fas fa-play"></i>

Watch Now

</button>

<button

id="favoriteBtn"

class="secondary-btn">

<i class="fas fa-heart"></i>

Favorite

</button>

<button

id="shareBtn"

class="secondary-btn">

<i class="fas fa-share-alt"></i>

Share

</button>

</div>

</div>

</div>

</div>

</section>

<!-- ===========================
PLAYER SECTION
=========================== -->

<section class="player-section">

<div class="player-card">

<div class="player-top">

<h2>

<i class="fas fa-play-circle"></i>

Watch Now

</h2>

<div class="server-box">

<label for="server">

Server

</label>

<select
id="server"
onchange="changeServer()">

<option value="vidfast">VidFast</option>

<option value="multiembed">MultiEmbed</option>

<option value="2embed">2Embed</option>

<option value="vidsrc.cc">Vidsrc.cc</option>

<option value="vidsrc.me">Vidsrc.me</option>

<option value="player.videasy.net">Player.Videasy.net</option>

</select>

</div>

</div>

<div class="video-container">

<iframe

id="moviePlayer"

src=""

frameborder="0"

allowfullscreen

loading="lazy">

</iframe>

</div>

</div>

</section>



<!-- ===========================
MOVIE DETAILS
=========================== -->

<section class="details-section">

<div class="section-title">

<h2>

Movie Details

</h2>

</div>

<div class="details-grid">

<div class="detail-item">

<h3>Release Date</h3>

<p id="releaseDate">Loading...</p>

</div>

<div class="detail-item">

<h3>Status</h3>

<p id="movieStatus">Loading...</p>

</div>

<div class="detail-item">

<h3>Original Language</h3>

<p id="originalLanguage">Loading...</p>

</div>

<div class="detail-item">

<h3>Popularity</h3>

<p id="moviePopularity">Loading...</p>

</div>

</div>

</section>



<!-- ===========================
CAST
=========================== -->

<section class="cast-section">

<div class="section-title">

<h2>

Cast

</h2>

</div>

<div

id="castList"

class="cast-list">

</div>

</section>



<!-- ===========================
MORE LIKE THIS
=========================== -->

<section class="recommend-section">

<div class="section-title">

<h2>

More Like This

</h2>

</div>

<div

id="recommendList"

class="recommend-grid">

</div>

</section>

<!-- ===========================
FOOTER
=========================== -->

<footer class="watch-footer">

<div class="footer-content">

<img
src="metflixlogo.png"
class="footer-logo"
alt="METFLIX">

<p>

© 2026 METFLIX

</p>

<p>

Powered by TMDB API

</p>

</div>

</footer>

</div>

<script type="module" src="js/watch.js"></script>

</body>

</html>
