<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
}

.login-box{
position:relative;
z-index:1;
background:rgba(0,0,0,.75);
padding:40px;
width:350px;
border-radius:8px;
}

h1{
color:#E50914;
margin-bottom:30px;
text-align:center;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:4px;
background:#333;
color:white;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#E50914;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#c40812;
}

p{
margin-top:20px;
text-align:center;
color:white;
}

a{
color:#E50914;
text-decoration:none;
}
</style>

</head>
<body>

<div class="overlay"></div>

<div class="login-box">

<h1>METFLIX</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">
Sign In
</button>
<p style="text-align:center; margin-top:15px;">
    <a href="#" id="forgotPassword" style="color:#E50914;">
        Forgot Password?
    </a>
</p>
  
<p>
Wala ka pang account?
<a href="register.html">Register</a>
</p>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
