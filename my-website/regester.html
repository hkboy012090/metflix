<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metflix - Register</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#141414;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-box{
background:#222;
padding:40px;
width:350px;
border-radius:8px;
}

h1{
color:#E50914;
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
background:#333;
border:none;
border-radius:4px;
color:white;
}

button{
width:100%;
padding:14px;
background:#E50914;
border:none;
color:white;
font-size:16px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#c40812;
}

p{
text-align:center;
margin-top:20px;
color:white;
}

a{
color:#E50914;
text-decoration:none;
}
</style>

</head>
<body>

<div class="register-box">

<h1>Create Account</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="registerBtn">
Register
</button>

<p>
May account ka na?
<a href="login.html">Login</a>
</p>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
